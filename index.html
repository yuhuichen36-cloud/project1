<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AETHER-2 · 字符终端</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="workspace">
    <div class="chassis" id="chassis">
      <span class="screw screw-tl" aria-hidden="true"></span>
      <span class="screw screw-tr" aria-hidden="true"></span>
      <span class="screw screw-bl" aria-hidden="true"></span>
      <span class="screw screw-br" aria-hidden="true"></span>
      <div class="chassis-grain" aria-hidden="true"></div>

      <aside class="panel control-panel">
        <header class="panel-header">
          <div class="brand">
            <h1 class="brand-name">AETHER-2</h1>
            <span class="brand-sub">字符终端</span>
          </div>
          <div class="header-meta">
            <span class="power-led" title="电源" aria-label="电源指示灯"></span>
            <div class="vent" aria-hidden="true"></div>
          </div>
        </header>

        <section class="control-block">
          <div class="btn-row">
            <button type="button" class="hw-btn" id="btn-load-image" data-press>
              载入图片
            </button>
            <button type="button" class="hw-btn" id="btn-load-video" data-press>
              载入视频
            </button>
          </div>
          <input type="file" id="file-image" accept="image/*" hidden />
          <input type="file" id="file-video" accept="video/*" hidden />
        </section>

        <section class="control-block">
          <div class="slider-row">
            <label class="ctrl-label" for="cols">
              <span class="dot"></span>屏幕列数
            </label>
            <div class="slider-track-wrap">
              <input type="range" id="cols" min="24" max="120" value="68" />
            </div>
            <output class="value-box" for="cols" id="cols-val">68</output>
          </div>

          <div class="zoom-row">
            <div class="slider-row zoom-slider">
              <label class="ctrl-label" for="zoom">
                <span class="dot"></span>图像缩放
              </label>
              <div class="slider-track-wrap">
                <input type="range" id="zoom" min="50" max="200" value="100" />
              </div>
              <output class="value-box" for="zoom" id="zoom-val">1.00</output>
            </div>
            <div class="knob-wrap">
              <div
                class="knob"
                id="knob"
                role="slider"
                aria-label="图像缩放旋钮"
                aria-valuemin="0.5"
                aria-valuemax="2"
                aria-valuenow="1"
                tabindex="0"
              >
                <div class="knob-face">
                  <span class="knob-marker"></span>
                  <span class="knob-center"></span>
                </div>
              </div>
            </div>
          </div>

          <div class="slider-row">
            <label class="ctrl-label" for="contrast">
              <span class="dot"></span>对比度
            </label>
            <div class="slider-track-wrap">
              <input type="range" id="contrast" min="50" max="200" value="125" />
            </div>
            <output class="value-box" for="contrast" id="contrast-val">125</output>
          </div>
        </section>

        <section class="control-block">
          <div class="seg-group">
            <span class="ctrl-label"><span class="dot"></span>渲染方式</span>
            <div class="seg-btns" role="group" aria-label="渲染方式">
              <button type="button" class="seg-btn active" data-render="char" data-press>字符</button>
              <button type="button" class="seg-btn" data-render="texture" data-press>纹理</button>
            </div>
          </div>

          <div class="seg-group">
            <span class="ctrl-label"><span class="dot"></span>字符集</span>
            <div class="seg-btns" role="group" aria-label="字符集">
              <button type="button" class="seg-btn active" data-charset="classic" data-press>经典</button>
              <button type="button" class="seg-btn" data-charset="dense" data-press>密集</button>
              <button type="button" class="seg-btn" data-charset="dot" data-press>点阵</button>
              <button type="button" class="seg-btn" data-charset="wire" data-press>线框</button>
            </div>
          </div>
        </section>

        <section class="control-block switches-block">
          <div class="switch-row">
            <label class="switch">
              <input type="checkbox" id="invert" />
              <span class="switch-track"><span class="switch-thumb"></span></span>
              <span class="switch-text">反相</span>
            </label>
            <label class="switch">
              <input type="checkbox" id="dither" checked />
              <span class="switch-track"><span class="switch-thumb"></span></span>
              <span class="switch-text">抖动</span>
            </label>
            <label class="switch">
              <input type="checkbox" id="glow" checked />
              <span class="switch-track"><span class="switch-thumb"></span></span>
              <span class="switch-text">辉光</span>
            </label>
          </div>
        </section>

        <section class="control-block">
          <div class="seg-group">
            <span class="ctrl-label"><span class="dot"></span>屏幕色调</span>
            <div class="seg-btns" role="group" aria-label="屏幕色调">
              <button type="button" class="seg-btn active" data-tone="green" data-press>绿屏</button>
              <button type="button" class="seg-btn" data-tone="amber" data-press>琥珀</button>
              <button type="button" class="seg-btn" data-tone="paper" data-press>纸屏</button>
            </div>
          </div>
        </section>

        <section class="control-block play-block">
          <button type="button" class="hw-btn play-btn" id="btn-play" data-press>
            <svg class="play-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 5.5v13l11-6.5-11-6.5z" fill="currentColor" />
            </svg>
            播放
          </button>
        </section>
      </aside>

      <main class="panel display-panel">
        <div class="crt-bezel">
          <div class="crt-glass" id="crt" data-tone="green" data-glow="on">
            <canvas id="screen" width="680" height="520" aria-label="字符栅格显示"></canvas>
            <div class="crt-scanlines" aria-hidden="true"></div>
            <div class="crt-vignette" aria-hidden="true"></div>
            <div class="crt-reflection" aria-hidden="true"></div>
            <div class="crt-hud top">
              <span class="hud-title">字符栅格</span>
              <div class="signal">
                <span class="signal-bars" id="signal-bars" aria-hidden="true">
                  <i></i><i></i><i></i><i></i><i></i>
                </span>
                <span id="signal-text">无信号</span>
              </div>
            </div>
            <div class="crt-hud bottom">
              <span id="status-line">列: 68  行: 40  模式: 经典  通道 02 — 9600 波特</span>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="main.js" type="module"></script>
</body>
</html>
